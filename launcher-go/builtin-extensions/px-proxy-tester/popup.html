<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PX Proxy Tester</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      min-height: 200px;
      background: #0d1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #21262d;
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 16px;
      height: 16px;
    }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #f0f6fc;
    }

    .header-subtitle {
      font-size: 11px;
      color: #8b949e;
    }

    /* Main content */
    .content {
      padding: 12px 16px;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #f59e0b;
      color: #0d1117;
    }

    .btn-primary:hover {
      background: #fbbf24;
    }

    .btn-primary:disabled {
      background: #4a3a1a;
      color: #8b7a4a;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #21262d;
      color: #e2e8f0;
      border: 1px solid #30363d;
    }

    .btn-secondary:hover {
      background: #30363d;
      border-color: #484f58;
    }

    .btn-secondary:disabled {
      background: #161b22;
      color: #484f58;
      cursor: not-allowed;
      transform: none;
    }

    .btn svg {
      width: 14px;
      height: 14px;
    }

    /* IP Result Card */
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8b949e;
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .badge-residential {
      background: rgba(52, 211, 153, 0.12);
      color: #34d399;
    }

    .badge-residential .badge-dot {
      background: #34d399;
    }

    .badge-datacenter {
      background: rgba(251, 191, 36, 0.12);
      color: #fbbf24;
    }

    .badge-datacenter .badge-dot {
      background: #fbbf24;
    }

    .badge-unknown {
      background: rgba(139, 148, 158, 0.12);
      color: #8b949e;
    }

    .badge-unknown .badge-dot {
      background: #8b949e;
    }

    /* IP display */
    .ip-display {
      font-size: 22px;
      font-weight: 700;
      color: #f0f6fc;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      margin-bottom: 10px;
      word-break: break-all;
    }

    /* Info grid */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
    }

    .info-item {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .info-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #6e7681;
    }

    .info-value {
      font-size: 12px;
      color: #c9d1d9;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .info-value.full-width {
      grid-column: 1 / -1;
    }

    .info-item.full-width {
      grid-column: 1 / -1;
    }

    /* Latency */
    .latency-display {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }

    .latency-value {
      font-size: 20px;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    .latency-unit {
      font-size: 12px;
      color: #8b949e;
    }

    .latency-bar {
      flex: 1;
      height: 4px;
      background: #21262d;
      border-radius: 2px;
      overflow: hidden;
    }

    .latency-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .latency-green { color: #34d399; }
    .latency-green .latency-fill { background: #34d399; }

    .latency-yellow { color: #fbbf24; }
    .latency-yellow .latency-fill { background: #fbbf24; }

    .latency-red { color: #f87171; }
    .latency-red .latency-fill { background: #f87171; }

    /* Blacklist links */
    .blacklist-links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .bl-link {
      padding: 4px 10px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #f59e0b;
      font-size: 11px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .bl-link:hover {
      background: #30363d;
      border-color: #f59e0b;
    }

    /* History */
    .history-section {
      border-top: 1px solid #21262d;
      padding-top: 10px;
      margin-top: 4px;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .history-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8b949e;
    }

    .history-clear {
      font-size: 10px;
      color: #6e7681;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .history-clear:hover {
      color: #f87171;
      background: rgba(248, 113, 113, 0.1);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 8px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      font-size: 11px;
    }

    .history-ip {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #c9d1d9;
      font-weight: 500;
    }

    .history-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #6e7681;
      font-size: 10px;
    }

    .history-badge {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .history-empty {
      text-align: center;
      padding: 12px;
      color: #484f58;
      font-size: 11px;
    }

    /* Placeholder / Loading */
    .placeholder {
      text-align: center;
      padding: 24px 16px;
      color: #484f58;
    }

    .placeholder svg {
      width: 32px;
      height: 32px;
      margin-bottom: 8px;
      opacity: 0.4;
    }

    .placeholder-text {
      font-size: 12px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid transparent;
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error */
    .error-msg {
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 6px;
      padding: 8px 12px;
      color: #f87171;
      font-size: 11px;
      margin-bottom: 12px;
    }

    /* Section divider */
    .divider {
      height: 1px;
      background: #21262d;
      margin: 12px 0;
    }

    /* Hidden util */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d1117" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div>
      <div class="header-title">PX Proxy Tester</div>
      <div class="header-subtitle">Connection &amp; IP Analysis</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Action Buttons -->
    <div class="btn-row">
      <button class="btn btn-primary" id="checkIpBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        Check My IP
      </button>
      <button class="btn btn-secondary" id="testSpeedBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
        Test Speed
      </button>
    </div>

    <!-- Error message -->
    <div class="error-msg hidden" id="errorMsg"></div>

    <!-- Placeholder (shown when no check done yet) -->
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <div class="placeholder-text">Click "Check My IP" to analyze your connection</div>
    </div>

    <!-- IP Result Card -->
    <div class="card hidden" id="ipCard">
      <div class="card-header">
        <span class="card-title">IP Information</span>
        <span class="badge" id="typeBadge">
          <span class="badge-dot"></span>
          <span id="typeBadgeText">Unknown</span>
        </span>
      </div>
      <div class="ip-display" id="ipDisplay">--</div>
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Country</span>
          <span class="info-value" id="infoCountry">--</span>
        </div>
        <div class="info-item">
          <span class="info-label">City</span>
          <span class="info-value" id="infoCity">--</span>
        </div>
        <div class="info-item">
          <span class="info-label">Timezone</span>
          <span class="info-value" id="infoTimezone">--</span>
        </div>
        <div class="info-item">
          <span class="info-label">Region</span>
          <span class="info-value" id="infoRegion">--</span>
        </div>
        <div class="info-item full-width">
          <span class="info-label">ISP / Provider</span>
          <span class="info-value" id="infoIsp">--</span>
        </div>
      </div>
    </div>

    <!-- Latency Card -->
    <div class="card hidden" id="latencyCard">
      <div class="card-header">
        <span class="card-title">Latency</span>
      </div>
      <div class="latency-display" id="latencyDisplay">
        <span class="latency-value" id="latencyValue">--</span>
        <span class="latency-unit">ms</span>
        <div class="latency-bar">
          <div class="latency-fill" id="latencyFill" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- Blacklist Check Card -->
    <div class="card hidden" id="blacklistCard">
      <div class="card-header">
        <span class="card-title">Blacklist Check</span>
      </div>
      <div style="font-size: 11px; color: #8b949e; margin-bottom: 6px;">
        Check if your IP is listed on common blacklists:
      </div>
      <div class="blacklist-links" id="blacklistLinks"></div>
    </div>

    <!-- History Section -->
    <div class="history-section" id="historySection">
      <div class="history-header">
        <span class="history-title">Recent Checks</span>
        <button class="history-clear hidden" id="historyClearBtn">Clear</button>
      </div>
      <div id="historyList">
        <div class="history-empty">No checks yet</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
