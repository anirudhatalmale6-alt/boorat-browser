<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PX Warm-Up</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e2e8f0;
      font-size: 13px;
      line-height: 1.5;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #21262d;
    }

    .header img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f0f6fc;
      letter-spacing: -0.01em;
    }

    .header-text span {
      font-size: 11px;
      color: #8b949e;
    }

    .content {
      padding: 12px 16px 16px;
    }

    /* Status Section */
    .status-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #484f58;
      flex-shrink: 0;
    }

    .status-dot.active {
      background: #f59e0b;
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(245, 158, 11, 0.5); }
      50% { opacity: 0.6; box-shadow: 0 0 16px rgba(245, 158, 11, 0.8); }
    }

    .status-label {
      font-size: 13px;
      color: #8b949e;
    }

    .status-value {
      font-size: 13px;
      font-weight: 600;
      color: #f0f6fc;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-start {
      background: #f59e0b;
      color: #0d1117;
    }

    .btn-start:hover {
      background: #d97706;
    }

    .btn-start:disabled {
      background: #4a3a10;
      color: #8b7a3e;
      cursor: not-allowed;
    }

    .btn-stop {
      background: #21262d;
      color: #f85149;
      border: 1px solid #30363d;
    }

    .btn-stop:hover {
      background: #2d1215;
      border-color: #f85149;
    }

    .btn-stop:disabled {
      background: #161b22;
      color: #484f58;
      border-color: #21262d;
      cursor: not-allowed;
    }

    /* Progress */
    .progress-section {
      margin-bottom: 12px;
      display: none;
    }

    .progress-section.visible {
      display: block;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .progress-label {
      font-size: 12px;
      color: #8b949e;
    }

    .progress-count {
      font-size: 12px;
      color: #f59e0b;
      font-weight: 600;
    }

    .progress-bar-bg {
      width: 100%;
      height: 6px;
      background: #21262d;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f59e0b, #fbbf24);
      border-radius: 3px;
      width: 0%;
      transition: width 0.4s ease;
    }

    @keyframes progress-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .progress-bar-fill.animating {
      background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%);
      background-size: 200% 100%;
      animation: progress-shimmer 1.5s linear infinite;
    }

    /* Settings */
    .settings-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .settings-title {
      font-size: 11px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .setting-row:last-child {
      margin-bottom: 0;
    }

    .setting-label {
      font-size: 12px;
      color: #c9d1d9;
    }

    select {
      background: #0d1117;
      color: #e2e8f0;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      min-width: 120px;
      text-align: right;
    }

    select:focus {
      border-color: #f59e0b;
    }

    select:hover {
      border-color: #484f58;
    }

    /* Log */
    .log-section {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
    }

    .log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid #21262d;
    }

    .log-title {
      font-size: 11px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .log-clear {
      font-size: 11px;
      color: #484f58;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }

    .log-clear:hover {
      color: #8b949e;
    }

    .log-body {
      max-height: 150px;
      overflow-y: auto;
      padding: 6px 0;
    }

    .log-body::-webkit-scrollbar {
      width: 4px;
    }

    .log-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .log-body::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 2px;
    }

    .log-entry {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 3px 14px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .log-time {
      color: #484f58;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .log-url {
      color: #58a6ff;
      word-break: break-all;
    }

    .log-entry.error .log-url {
      color: #f85149;
    }

    .log-entry.success .log-url {
      color: #3fb950;
    }

    .log-empty {
      text-align: center;
      padding: 16px 14px;
      color: #484f58;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="PX Warm-Up">
    <div class="header-text">
      <h1>PX Warm-Up</h1>
      <span>Profile warming tool</span>
    </div>
  </div>

  <div class="content">
    <!-- Status -->
    <div class="status-card">
      <div class="status-left">
        <div class="status-dot" id="statusDot"></div>
        <div>
          <div class="status-label">Status</div>
          <div class="status-value" id="statusText">Idle</div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="btn-row">
      <button class="btn btn-start" id="btnStart">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Start Warm-Up
      </button>
      <button class="btn btn-stop" id="btnStop" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
        Stop
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-section" id="progressSection">
      <div class="progress-header">
        <span class="progress-label">Progress</span>
        <span class="progress-count" id="progressCount">0 / 0</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>

    <!-- Settings -->
    <div class="settings-card">
      <div class="settings-title">Settings</div>
      <div class="setting-row">
        <span class="setting-label">Category</span>
        <select id="category">
          <option value="general">General</option>
          <option value="shopping">Shopping</option>
          <option value="social">Social Media</option>
          <option value="news">News</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Visit Duration</span>
        <select id="duration">
          <option value="5">5 seconds</option>
          <option value="10" selected>10 seconds</option>
          <option value="20">20 seconds</option>
          <option value="30">30 seconds</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Sites to Visit</span>
        <select id="siteCount">
          <option value="10">10 sites</option>
          <option value="25" selected>25 sites</option>
          <option value="50">50 sites</option>
          <option value="100">100 sites</option>
        </select>
      </div>
    </div>

    <!-- Log -->
    <div class="log-section">
      <div class="log-header">
        <span class="log-title">Activity Log</span>
        <button class="log-clear" id="btnClearLog">Clear</button>
      </div>
      <div class="log-body" id="logBody">
        <div class="log-empty" id="logEmpty">No activity yet</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
